<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนบุคลากร | Police Time Checkout</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --police-blue: #1a237e;
            --police-light: #e8eaf6;
            --accent-gold: #ffd700;
            --bg-soft: #f0f2f5;
            --card-radius: 24px;
            --deep-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-soft);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .p-card {
            background: #ffffff;
            border-radius: var(--card-radius);
            border: none;
            box-shadow: var(--deep-shadow);
            transition: transform 0.3s ease;
        }

        .reg-card {
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            border-top: 6px solid var(--police-blue);
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: var(--police-light);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--police-blue);
        }

        .form-control-luxe {
            border-radius: 14px;
            padding: 0.8rem 1.2rem;
            border: 2px solid #edf2f7;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .form-control-luxe:focus {
            border-color: var(--police-blue);
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.1);
            background: #fff;
        }

        .btn-luxe {
            border-radius: 16px;
            padding: 1rem 1.5rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
        }

        .btn-primary-luxe {
            background: var(--police-blue);
            color: white;
        }

        .btn-primary-luxe:hover {
            background: #0d1642;
            color: white;
            box-shadow: 0 8px 25px rgba(26, 35, 126, 0.25);
            transform: translateY(-2px);
        }

        /* ══ LOADING SCREEN ══ */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            pointer-events: all;
            cursor: wait;
        }

        .spinner-premium {
            width: 50px;
            height: 50px;
            border: 4px solid var(--police-light);
            border-top: 4px solid var(--police-blue);
            border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.5, 0, 0.5, 1);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; }
    </style>
</head>

<body>

    <div id="loadingScreen">
        <div class="spinner-premium"></div>
        <div class="mt-3 fw-bold text-primary small" style="font-family: 'Inter', sans-serif;">SAVING DATA...</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="card p-card reg-card">
        <div class="p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="logo-box">
                    <i class="fa-solid fa-user-plus fa-2x"></i>
                </div>
                <h2 class="fw-800 mb-1">ลงทะเบียนเจ้าหน้าที่</h2>
                <p class="text-muted small mb-0">Police Personnel Registration System</p>
            </div>

            <form id="regForm" onsubmit="handleRegister(event)">
                <!-- Full Name -->
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted ps-1 text-uppercase">ชื่อ-นามสกุล</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 pe-0"><i class="fa-solid fa-user text-muted opacity-50"></i></span>
                        <input type="text" id="fullName" class="form-control form-control-luxe border-0 shadow-none" placeholder="เช่น ส.ต.ท. สมชาย ใจดี" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted ps-1 text-uppercase">อีเมลส่วนตัว / หน่วยงาน</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 pe-0"><i class="fa-solid fa-envelope text-muted opacity-50"></i></span>
                        <input type="email" id="email" class="form-control form-control-luxe border-0 shadow-none" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <!-- Police Code -->
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted ps-1 text-uppercase">รหัสประจำตัวตำรวจ (ID)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 pe-0"><i class="fa-solid fa-id-card text-muted opacity-50"></i></span>
                        <input type="text" id="policeCode" class="form-control form-control-luxe border-0 shadow-none" placeholder="ระบุเลขประจำตัว" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-luxe btn-primary-luxe w-100 py-3 mb-3 shadow-sm" id="btnSubmit">
                    ยืนยันการลงทะเบียน <i class="fa-solid fa-paper-plane ms-2"></i>
                </button>
                
                <div class="text-center mt-2">
                    <div class="p-3 bg-light rounded-4 small text-muted">
                        <i class="fa-solid fa-circle-info me-1 text-primary"></i> 
                        ข้อมูลจะถูกบันทึกลงในระบบ Google Sheet โดยตรง
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            WEB_APP_URL: 'https://script.google.com/macros/s/AKfycbzbX9M52hcMTnyFZMZdV86ZuB9qF_uBifuA7vlFSu9J0WwKRPJ-jI39hssIAhavDjb3/exec',
        };

        const UI = {
            toast(type, title, msg) {
                const color = type === 'success' ? '#2e7d32' : '#c62828';
                const container = document.getElementById('toastContainer');
                const el = document.createElement('div');
                el.className = `toast show p-card border-0 mb-3 overflow-hidden shadow-lg`;
                el.style.maxWidth = '320px';
                el.innerHTML = `
                    <div class="d-flex border-start border-4" style="border-color: ${color} !important;">
                        <div class="p-3 text-white d-flex align-items-center justify-content-center" style="background: ${color}; width: 60px;">
                            <i class="fa-solid ${type === 'success' ? 'fa-check' : 'fa-triangle-exclamation'} fa-lg"></i>
                        </div>
                        <div class="p-3 bg-white flex-grow-1">
                            <strong class="d-block mb-1" style="color: ${color}">${title}</strong>
                            <div class="small text-muted">${msg}</div>
                        </div>
                        <button type="button" class="btn-close m-2 shadow-none" data-bs-dismiss="toast" onclick="this.closest('.toast').remove()"></button>
                    </div>`;
                container.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            },
            showLoading() { 
                document.getElementById('loadingScreen').style.display = 'flex';
                document.body.style.pointerEvents = 'none';
            },
            hideLoading() { 
                document.getElementById('loadingScreen').style.display = 'none';
                document.body.style.pointerEvents = '';
            }
        };

        async function handleRegister(event) {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const policeCode = document.getElementById('policeCode').value.trim();
            const btn = document.getElementById('btnSubmit');

            if (!CONFIG.WEB_APP_URL) {
                UI.toast('error', 'ข้อผิดพลาด', 'กรุณาระบุ WEB_APP_URL ในส่วน CONFIG ก่อนใช้งาน');
                return;
            }

            btn.disabled = true;
            UI.showLoading();

            try {
                const data = {
                    action: 'register',
                    policeCode: policeCode,
                    policeName: fullName,
                    policeEmail: email
                };

                const response = await fetch(CONFIG.WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    UI.toast('success', 'ลงทะเบียนสำเร็จ', `ระบบได้รับข้อมูลของ ${fullName} เรียบร้อยแล้ว`);
                    document.getElementById('regForm').reset();
                } else {
                    throw new Error(result.message || 'เกิดข้อผิดพลาดในการบันทึก');
                }
            } catch (err) {
                console.error('Registration error:', err);
                UI.toast('error', 'เกิดข้อผิดพลาด', err.message);
            } finally {
                btn.disabled = false;
                UI.hideLoading();
            }
        }
    </script>
</body>

</html>
